name: Sync Calendar & Deploy

on:
  schedule:
    # 매일 한국시간 오전 6시 (UTC 21:00 전날)
    - cron: "0 21 * * *"
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: write # gh-pages 브랜치에 push하기 위해 필요

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync + HTML generation
        env:
          NAVER_COOKIE: ${{ secrets.NAVER_COOKIE }}
        run: python main.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          # 매번 새로 덮어쓰기 (히스토리 불필요)
          force_orphan: true
          commit_message: "chore: auto-sync ${{ github.run_number }}"
