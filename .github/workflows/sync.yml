name: Sync Calendar & Deploy

on:
  schedule:
    # 매일 한국시간 오전 11시 (UTC 02:00)
    - cron: "0 2 * * *"
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: write # gh-pages 브랜치에 push하기 위해 필요

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_EXE: C:\Users\gkgkd\AppData\Local\Programs\Python\Python314\python.exe

jobs:
  sync-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: '& "$env:PYTHON_EXE" -m pip install --force-reinstall -r requirements.txt'

      - name: Run sync + HTML generation + alimtalk
        env:
          NAVER_COOKIE:      ${{ secrets.NAVER_COOKIE }}
          ALIGO_API_KEY:     ${{ secrets.ALIGO_API_KEY }}
          ALIGO_USER_ID:     ${{ secrets.ALIGO_USER_ID }}
          ALIGO_SENDER_KEY:  ${{ secrets.ALIGO_SENDER_KEY }}
          ALIGO_TPL_CODE:    ${{ secrets.ALIGO_TPL_CODE }}
          SENDER_PHONE:      ${{ secrets.SENDER_PHONE }}
          TEST_MODE:         ${{ secrets.TEST_MODE }}
        run: '& "$env:PYTHON_EXE" main.py'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "chore: auto-sync ${{ github.run_number }}"
